name = "agentic-cms"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
BASE_URL = "https://agentic-cms.blumepage.workers.dev"
GITHUB_REPO = "blumepage/agentic-cms"

# Secrets (set via `wrangler secret put`):
# DATABASE_URL, GITHUB_TOKEN, CLAUDE_API_KEY, ADMIN_SECRET

# Durable Object for agent sessions
[durable_objects]
bindings = [
  { name = "AGENT_SESSION", class_name = "AgentSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["AgentSession"]

# Cron trigger for periodic git sync
[triggers]
crons = ["*/5 * * * *"]
